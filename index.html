<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Selva: Metáfora vs Comparação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <div class="stat-box">Tempo: <span id="timer">05:00</span></div>
            <div class="stat-box">Acertos: <span id="score">0</span></div>
        </header>

        <main id="game-screen">
            <div id="card-container">
                <div id="phrase-card" class="card">
                    <p id="phrase-text">Carregando desafio...</p>
                </div>
                <div id="feedback" class="hidden"></div>
            </div>

            <div class="controls">
                <button class="btn btn-metaphor" onclick="checkAnswer('metafora')">Metáfora</button>
                <button class="btn btn-comparison" onclick="checkAnswer('comparacao')">Comparação</button>
            </div>
        </main>

        <div id="end-screen" class="hidden">
            <h2>Missão Cumprida!</h2>
            <p>Você resgatou <span id="final-score">0</span> frases na selva.</p>
            <button class="btn-restart" onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
